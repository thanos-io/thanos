syntax = "proto3";
package thanos;

option go_package = "labelpb";

import "gogoproto/gogo.proto";

option (gogoproto.sizer_all) = true;
option (gogoproto.marshaler_all) = true;
option (gogoproto.unmarshaler_all) = true;
option (gogoproto.goproto_getters_all) = false;

// Do not generate XXX fields to reduce memory footprint and opening a door
// for zero-copy casts to/from prometheus data types.
option (gogoproto.goproto_unkeyed_all) = false;
option (gogoproto.goproto_unrecognized_all) = false;
option (gogoproto.goproto_sizecache_all) = false;

message Label {
    string name  = 1;
    string value = 2;
}

message LabelSet {
    repeated Label labels = 1 [(gogoproto.nullable) = false];
}

message ZLabelSet {
    repeated Label labels = 1 [(gogoproto.nullable) = false, (gogoproto.customtype) = "ZLabel"];
}

// SymTableLabel is one label encoded as two references into a SymbolTable.
message SymTableLabel {
    uint32 name_ref  = 1;
    uint32 value_ref = 2;
}

// SymbolTable is the dedup table used by SymTableLabel. The bytes of every
// interned symbol are packed end-to-end; offsets[i] is the end
// offset of symbol `i`, so symbol `i` is `table[offsets[i-1]:offsets[i]]`
// (with offsets[-1] := 0).
message SymbolTable {
    repeated uint32 offsets = 1;
    bytes table = 2;
}
